<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APOCALYPSE — Netflix × ThreeJS</title>

    <!--  garder ça -->
    <link rel="stylesheet" href="/src/style.css" />
  </head>

  <body>
    <div id="loader">
      <div id="loader-fleche"></div>
    </div>

    <div id="accueil">
      <video id="bg-video" autoplay loop muted playsinline>
        <!--  correction ici -->
        <source src="/videos/apocalypse.mp4" type="video/mp4" />
      </video>

      <div id="bg-overlay"></div>

      <div id="accueil-content">
        <h1 id="logo">
          <span class="logo-apo">APOCALYPSE</span>
          <span class="logo-sub">Netflix × ThreeJS</span>
        </h1>

        <button id="btn-jouer">NOUVELLE PARTIE</button>

        <div id="classement">
          <h3>TOP 5</h3>
          <ul id="classement-liste">
            <li>— — —</li>
          </ul>
        </div>
      </div>
    </div>

    <div id="transition" class="hidden"></div>

    <div id="jeu" class="hidden">
      <!-- ton code inchangé ici -->
    </div>

    <div id="game-over" class="hidden">
      <div id="game-over-inner">
        <h1>GAME OVER</h1>
        <p>Score final : <span id="go-score">0</span></p>
        <button id="btn-rejouer">REJOUER</button>
      </div>
    </div>

    <div id="victoire" class="hidden">
      <div id="victoire-inner">
        <h1>VOUS ÊTES SORTI</h1>
        <p>Score : <span id="v-score">0</span></p>
        <button id="btn-rejouer-v">REJOUER</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
