<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APOCALYPSE — Netflix × ThreeJS</title>
  </head>

  <body>
    <!-- LOADER -->
    <div id="loader">
      <div id="loader-fleche"></div>
    </div>

    <!-- ACCUEIL -->
    <div id="accueil">
      <div id="accueil-content">
        <h1 id="logo">
          <span class="logo-apo">APOCALYPSE</span>
          <span class="logo-sub">Netflix × ThreeJS</span>
        </h1>

        <p>Retrouve les films cachés dans la bibliothèque</p>

        <!-- UN SEUL BOUTON -->
        <button id="btn-jouer">JOUER</button>

        <div id="classement">
          <h3>TOP 5</h3>
          <ul id="classement-liste">
            <li>— — —</li>
          </ul>
        </div>
      </div>
    </div>

    <!-- TRANSITION -->
    <div id="transition" class="hidden"></div>

    <!-- JEU -->
    <div id="jeu" class="hidden">
      <div id="hud">
        <div>
          <span class="hud-label">SCORE</span>
          <span id="score-value">0</span>
        </div>
        <div>
          <span class="hud-label">TEMPS</span>
          <span id="timer-value">03:00</span>
        </div>
        <div>
          <span class="hud-label">ZONE</span>
          <span id="zone-value">A</span>
        </div>
      </div>

      <div id="reticule">
        <div class="ret-h"></div>
        <div class="ret-v"></div>
      </div>

      <div id="interface-indice" class="hidden">
        <p id="indice-texte"></p>
        <button id="btn-fermer-indice">✕</button>
      </div>

      <div id="interface-reponse" class="hidden">
        <p>TAPE UN TITRE</p>
        <input id="input-reponse" type="text" />
        <button id="btn-valider">VALIDER</button>
        <button id="btn-annuler">ANNULER</button>
      </div>

      <div id="carte-resultat" class="hidden">
        <div id="carte-inner">
          <img id="film-poster" />
          <div>
            <h2 id="film-title"></h2>
            <p id="film-year"></p>
          </div>
        </div>
        <button id="btn-continuer">CONTINUER</button>
      </div>
    </div>

    <!-- GAME OVER -->
    <div id="game-over" class="hidden">
      <h1>GAME OVER</h1>
      <p>Score : <span id="go-score">0</span></p>
      <button id="btn-rejouer">REJOUER</button>
    </div>

    <!-- VICTOIRE -->
    <div id="victoire" class="hidden">
      <h1>VOUS ÊTES SORTI</h1>
      <p>Score : <span id="v-score">0</span></p>
      <button id="btn-rejouer-v">REJOUER</button>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
