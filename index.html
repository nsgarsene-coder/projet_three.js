<!doctype html>
<head><html lang="fr">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CINÉLIBRIUM</title>

  <!-- CSS -->
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>

  <!-- ═══════════════════════════════
       LOADER
  ═══════════════════════════════ -->
  <div id="loader">
    <div id="loader-fleche"></div>
  </div>

  <!-- ═══════════════════════════════
       ACCUEIL (AVEC VIDEO)
  ═══════════════════════════════ -->
  <div id="accueil">

    <!--  vidéo en arrière-plan -->
    <video id="bg-video" autoplay  loop playsinline>
      <source src="src\vidéos\apocalypse.mp4" type="video/mp4">
    </video>

    <!-- overlay sombre -->
    <div id="bg-overlay"></div>

    <!-- contenu -->
    <div id="accueil-content">
      <h1 id="logo">
        <span class="logo-apo">CINÉLIBRIUM</span>
        <span class="logo-sub">APOCALYPSE</span>
      </h1>

      <button id="btn-jouer">ENTRER</button>
    </div>
  </div>

  <!-- ═══════════════════════════════
       TRANSITION
  ═══════════════════════════════ -->
  <div id="transition" class="hidden"></div>

  <!-- ═══════════════════════════════
       JEU (SCÈNE 3D)
  ═══════════════════════════════ -->
  <div id="jeu" class="hidden">

    <!-- HUD minimal -->
    <div id="hud">
      <div>
        <span>SCORE</span>
        <span id="score-value">0</span>
      </div>

      <div>
        <span>TEMPS</span>
        <span id="timer-value">03:00</span>
      </div>
    </div>

    <!-- réticule FPS -->
    <div id="reticule"></div>

  </div>

  <!-- ═══════════════════════════════
       INTERFACE INDICE
  ═══════════════════════════════ -->
  <div id="interface-indice" class="hidden">
    <p id="indice-texte"></p>
  </div>

  <!-- ═══════════════════════════════
       INTERFACE RÉPONSE
  ═══════════════════════════════ -->
  <div id="interface-reponse" class="hidden">
    <p>TAPE LE NOM DU FILM</p>
    <input id="input-reponse" type="text" />
    <button id="btn-valider">VALIDER</button>
  </div>

  <!-- ═══════════════════════════════
       CARTE FILM (APRÈS RÉUSSITE)
  ═══════════════════════════════ -->
  <div id="carte-resultat" class="hidden">
    <h2 id="film-title"></h2>
    <button id="btn-continuer">CONTINUER</button>
  </div>

  <!-- ═══════════════════════════════
       GAME OVER
  ═══════════════════════════════ -->
  <div id="game-over" class="hidden">
    <h1>GAME OVER</h1>
    <button id="btn-rejouer">REJOUER</button>
  </div>

  <!-- ═══════════════════════════════
       VICTOIRE
  ═══════════════════════════════ -->
  <div id="victoire" class="hidden">
    <h1>VOUS ÊTES SORTI</h1>
    <button id="btn-rejouer-v">REJOUER</button>
  </div>

  <!-- JS -->
  <script type="module" src="/src/main.js"></script>

</body>
</html>
